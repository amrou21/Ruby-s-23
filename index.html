<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby's Love Story 🎮</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; background: #000; }
        .game-container { height: 100vh; width: 100vw; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; transition: background-image 0.5s ease-in-out; }
        .overlay { background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 40px 20px; text-align: center; }
        .dialogue-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 2px solid #ffd700; border-radius: 15px; padding: 20px; color: #fff; font-size: 1.1rem; margin-bottom: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .button-group { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { background: rgba(255, 255, 255, 0.9); color: #000; padding: 15px; border-radius: 50px; border: none; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: #ffd700; transform: scale(1.02); }
        input { padding: 15px; border-radius: 25px; border: none; width: 80%; margin-bottom: 10px; text-align: center; font-size: 1.1rem; outline: none; }
    </style>
</head>
<body>

<div class="game-container" id="game-bg" style="background-image: url('scene1.jpg');">
    <div class="overlay">
        <div class="dialogue-box" id="text-box">
            "Ya saba7 el toot, ya hlw ya cute! 😍"
        </div>
        <div class="button-group" id="btn-group">
            <button class="choice-btn" onclick="goToScene2()">Eh ya 3asal, etfadel?</button>
        </div>
    </div>
</div>

<script>
    // CHANGE THIS TO HER REAL NUMBER
    const realNumber = '0123456789'; 

    const bg = document.getElementById('game-bg');
    const textBox = document.getElementById('text-box');
    const btnGroup = document.getElementById('btn-group');

    function goToScene2() {
        // Scene 2: The Heroic Rescue
        bg.style.backgroundImage = "url('scene2.jpg')"; // Muscle Image
        textBox.innerHTML = "La2 ba2a... ento shakloko mosh 3arfin el kalam 3ala eh! <b>Deh t5oseeny</b>, ya3ni elly hyfakar yboselha hayshof wesh mosh haye3gebo!<br><br>3ashanek ya Ruby, hadany adafe3 3anek ya kooti! Matkhafeesh ya moza, tool ma ana gambek mafish ragel y2dar y2ata3lik kalma.";
        btnGroup.innerHTML = `<button class="choice-btn" onclick="goToScene3()">Yalla bina!</button>`;
    }

    function goToScene3() {
        // Scene 3: The Felucca Date
        bg.style.backgroundImage = "url('scene3.jpg')"; // Nile/Felucca Image
        textBox.innerHTML = "Bas ya Ruby... el falucca deh mosh na2esha gher enna nekml el lila 3ala kher.<br><br>Tegi nro7o na5odlena meshwar youm 30 April ya 3asal? 3ayez el rard delwa2ti!";
        btnGroup.innerHTML = `
            <button class="choice-btn" onclick="answeredYes()">Yes!</button>
            <button class="choice-btn" id="no-btn" onclick="answeredNo()">No.</button>
        `;
    }

    function answeredNo() {
        textBox.innerHTML = "Kont 3aref eno 'No' 3ala fekra... hanesta3bat? 'No' deh 3andaha yasta! Doosy 'Yes' ya Roba a7sanlek!";
        // We keep the buttons, but maybe make the Yes button bigger/glow
    }

    function answeredYes() {
        // Scene 4: The Finale
        bg.style.backgroundImage = "url('scene4.jpg')"; // Phone/Wink Image
        textBox.innerHTML = "5alsana ya 3asal enta 😉... bas ba2olk eh, telephony fe moshkla.<br><br>3arfa telephony na2so eh? <b>Na2so rakamek ya 3asal!</b> 😉";
        btnGroup.innerHTML = `
            <input type="text" id="numInput" placeholder="01xxxxxxxxx">
            <button class="choice-btn" onclick="checkFinal()">5alsana</button>
        `;
    }

    function checkFinal() {
        const val = document.getElementById('numInput').value;
        if (val.trim() === realNumber) {
            bg.style.backgroundImage = "url('scene5.jpg')"; // Birthday celebration image
            textBox.innerHTML = "Eshta ya Roba! Happy 23rd Birthday ya moza... See you on April 30th! 🔥🎂";
            btnGroup.innerHTML = "";
            // Add some confetti effect if you want later!
        } else {
            alert("Eh ya Ruby? Btekdebhy 3lya?! 😂 Put the real one!");
        }
    }
</script>

</body>
</html>
